<link rel="stylesheet" href="../assets/controls.css">

<section class="controls">
  <h2>Buttons</h2>
  <div class="row">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-danger">Delete</button>
  </div>

  <h2>Form inputs</h2>
  <div class="row form-row">
    <label>Text<input type="text" placeholder="Enter text"></label>
    <label>Email<input type="email" placeholder="name@example.com"></label>
    <label>Password<input type="password" placeholder="••••••••"></label>
    <label>Search<input type="search" placeholder="Search"></label>
    <label>Textarea<textarea rows="4" placeholder="Write something..."></textarea></label>
  </div>

  <h2>Select / Dropdown</h2>
  <div class="row">
    <select>
      <option>Choose one</option>
      <option>Option A</option>
      <option>Option B</option>
    </select>
  </div>

  <h2>Checkboxes & Radios</h2>
  <div class="row">
    <label class="checkbox"><input type="checkbox"> Remember me</label>
    <label class="checkbox"><input type="checkbox" checked> Subscribed</label>
    <label class="radio"><input type="radio" name="r"> Option 1</label>
    <label class="radio"><input type="radio" name="r" checked> Option 2</label>
  </div>

  <h2>Switch (toggle)</h2>
  <div class="row">
    <label class="switch">
      <input type="checkbox">
      <span class="slider"></span>
    </label>
    <label class="switch">
      <input type="checkbox" checked>
      <span class="slider"></span>
    </label>
  </div>

  <h2>Range / Slider</h2>
  <div class="row">
    <input type="range" min="0" max="100" value="40">
  </div>

  <h2>Pills / Badges</h2>
  <div class="row">
    <span class="badge">New</span>
    <span class="badge badge-soft">Beta</span>
    <span class="pill">Photography</span>
  </div>

  <h2>Cards / Controls Collection</h2>
  <div class="cards">
    <div class="card">
      <h3>Card Title</h3>
      <p>Short description of the control or component.</p>
      <div class="card-actions">
        <button class="btn btn-primary">Action</button>
        <button class="btn btn-ghost">More</button>
      </div>
    </div>
    <div class="card">
      <h3>Form Example</h3>
      <label>Label<input type="text" placeholder="Value"></label>
      <div class="card-actions">
        <button class="btn">Save</button>
      </div>
    </div>
  </div>

</section>
